name: Lint, Type-Check and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run pyright

      - name: Test
        run: uv run pytest
